<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Explorateur Météo</title>
</head>
<style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
        }
        h1 { color: #00d4ff; }
        input {
            padding: 10px;
            width: 80%;
            border-radius: 10px;
            border: none;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            padding: 10px 30px;
            background-color: #00d4ff;
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0099bb; }
        .meteo-card {
            background-color: #0f3460;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .erreur { color: #ff4444; margin-top: 20px; }
    </style>
</head>
<body>
  <body>
    <div class="container">
        <h1>🌤️ Explorateur Météo</h1>

        <form method="POST">
            <input type="text" name="ville" 
                   placeholder="Entrez une ville..." required>
            <br>
            <button type="submit">🔍 Rechercher</button>
        </form>

        {% if erreur %}
        <p class="erreur">❌ {{ erreur }}</p>
        {% endif %}

        {% if meteo %}
        <div class="meteo-card">
            <h2>📍 {{ meteo.nom }}</h2>
            <p>🌡️ Température : {{ meteo.temp }}°C</p>
            <p>🌤️ Conditions : {{ meteo.conditions }}</p>
            <p>💧 Humidité : {{ meteo.humidite }}%</p>
        </div>
        {% endif %}

    </div>
</body>
</html>  
</body>
</html>
